<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Define a radial gradient with randomizing color stops -->
    <radialGradient id="tiedye-gradient" cx="50%" cy="50%" r="50%">
      <!-- Randomly selected colors with animation for morphing effect -->
      <stop offset="0%">
        <animate attributeName="stop-color" values="#ff0000; #0000ff; #00ff00" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="33%">
        <animate attributeName="stop-color" values="#0000ff; #ffff00; #ff0000" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="66%">
        <animate attributeName="stop-color" values="#00ff00; #ff0000; #0000ff" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%">
        <animate attributeName="stop-color" values="#ffff00; #00ff00; #0000ff" dur="8s" repeatCount="indefinite" />
      </stop>
    </radialGradient>
  </defs>
  <!-- Draw a circle using the defined animated radial gradient -->
  <circle cx="100" cy="100" r="90" fill="url(#tiedye-gradient)" />
</svg>
