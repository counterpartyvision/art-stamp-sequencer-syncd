
<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Define gradient for neon colors -->
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff00ff" />
      <stop offset="100%" stop-color="#00ffff" />
    </linearGradient>

    <!-- Define neon glow effect -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Outer frame with animated color -->
  <rect x="50" y="50" width="300" height="300" fill="none" stroke="url(#neonGradient)" stroke-width="10" filter="url(#neonGlow)">
    <animate attributeName="stroke" values="#ff00ff; #00ffff; #ff0000; #00ff00" dur="10s" repeatCount="indefinite" />
  </rect>

  <!-- Inner shapes with rotation and glow effect -->
  <g transform="rotate(45 200 200)">
    <!-- Rotating square with random color change -->
    <rect x="125" y="125" width="150" height="150" fill="none" stroke="url(#neonGradient)" stroke-width="8" filter="url(#neonGlow)">
      <animateTransform attributeType="XML" attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="15s" repeatCount="indefinite" />
    </rect>

    <!-- Rotating circles with changing size and glow -->
    <circle cx="200" cy="200" r="60" fill="none" stroke="url(#neonGradient)" stroke-width="6" filter="url(#neonGlow)">
      <animateTransform attributeType="XML" attributeName="transform" type="rotate" from="360 200 200" to="0 200 200" dur="15s" repeatCount="indefinite" />
      <animate attributeName="r" values="60; 90; 60" dur="10s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Additional optical illusion effect -->
  <g transform="rotate(-45 200 200)">
    <rect x="150" y="150" width="100" height="100" fill="none" stroke="url(#neonGradient)" stroke-width="6" filter="url(#neonGlow)">
      <animateTransform attributeType="XML" attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="12s" repeatCount="indefinite" />
    </rect>
  </g>
</svg>
