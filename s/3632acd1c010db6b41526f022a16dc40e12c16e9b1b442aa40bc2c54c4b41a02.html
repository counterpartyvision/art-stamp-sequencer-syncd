        <style>
            html, body {
                margin: 0;
                height: 100%;
                display: grid;
                place-items: center;
                background: #faf8f5;
                cursor: none;
            }
            a, a:before, a:after {
                position: absolute;
                display: block;
            }    
            a {
                width: 300px;
            }
            a:before {
                content: "";
                width: 132%;
                height: 132%;
                top: -16%;
                left: -16%;
                background-color: #f8f8f8;
                z-index: -1;
                box-shadow:
                    inset 0 .3em .5em rgba(0,0,0,.3),
                    inset .1em 0 .1em rgba(0,0,0,.1),
                    inset -0.1em 0 .1em rgba(0,0,0,.1),
                    0 .3em .2em #fff;
            }
            a:after {
                content: "";
                width: 145%;
                height: 145%;
                top: -22.5%;
                left: -22.5%;
                background: #333;
                z-index: -2;
                box-shadow:
                    0 1em 2em -1em rgba(0,0,0,.4),
                    0 2em 2em -1em rgba(0,0,0,.3),
                    0 1em 2em -1em rgba(0,0,0,.2),
                    0 2em 1.5em -1em rgba(0,0,0,.2),
                    0 1em 4em .5em rgba(0,0,0,.1),
                    inset 0 .2em .1em #fff;
            }
            img {
                image-rendering: pixelated;
                background: #fff;
                display: block;
                width: 88%;
                height: auto;
                padding: 6%;
                box-shadow: inset 0 .3em .1em rgba(0,0,0,.2);
            }
            @media (max-width: 500px) {
                a {
                width: 50vw;
            }
                a:after {
                box-shadow:
                    0 .5em 1em -0.5em rgba(0,0,0,.4),
                    0 1em 1em -0.5em rgba(0,0,0,.3),
                    0 .5em 1em -0.5em rgba(0,0,0,.2),
                    0 1em 1em -0.5em rgba(0,0,0,.2),
                    0 .5em 2em .5em rgba(0,0,0,.1),
                    inset 0 .2em .1em #fff;
            }
        </style>
    </head>
