ialGradient id="A" cx="365.7" cy="284.6" r="18.9" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#f15a24"/><stop offset="0" stop-color="#ec5823"/><stop offset=".1" stop-color="#bb461c"/><stop offset=".2" stop-color="#8f3515"/><stop offset=".2" stop-color="#682710"/><stop offset=".3" stop-color="#481b0b"/><stop offset=".4" stop-color="#2d1107"/><stop offset=".5" stop-color="#190904"/><stop offset=".6" stop-color="#0b0402"/><stop offset=".8" stop-color="#030100"/><stop offset="1"/></radialGradient><g class="q"><path fill="url(#A)" stroke-width="6.5" d="M365 306.8 340.7 273l27-14 28 8.8z" class="r"/><g fill="#ff8400" stroke="#fff" stroke-width="0"><path d="M366.1 284q.4 0 .4.4H365l-.1-.1v-.2l.3-.1h.1l.1-.5v-.3l-.5-.8q0-.6.6-.8h.6l.4.3a1 1 0 0 1 0 .9l-.4.4v.1q-.3.4-.1.7zm.3-1.6q0-.4-.5-.6-.7-.1-.6.5t.5.5q.6-.2.6-.4z"/><path d="M366.4 282.4q0 .4-.6.4-.4 0-.4-.5t.5-.4q.5 0 .5.5zm-.4 0 .1-.1v-.1h-.1v-.1h-.3v.3h-.1v.1h.1v.1h.1zm-.1-.2v.1zm-.1.2h.2zM364 285v-.6l.2-.2 3.2.3q.2 0 .2.2v.5h-.1zm.2.4q-.2 0-.1-.2l3.3.2v.2h-.1zm-.7.2h1.1l.1.1q.5.2.5.7v.1h-.2l-.1-.1q0-.3-.3-.4l-1-.1h-.2c-.3 0-.4.5 0 .6h1.1v.1l.1.2H363q-.3-.2-.4-.7 0-.6.5-.5z"/><path d="M366.7 286.8h-.1l-.2-.2v-.3l-.2-.1h-.2l-.9-.1-.2-.2h1.4l.3.3z"/><path d="M367.8 287.2h-1l-.4-.1q-.5-.2-.4-.8h.2l.1.1q0 .4.2.4h.2l1 .1q.6-.1.1-.6h-1.1v-.1l-.2-.2h1.3l.4.2.2.4q0 .4-.6.6z"/><path d="m364.8 287-.4-.3v-.6l.3.1v.1q0 .4.2.4h.1l1 .1.2.2h-1.3z"/></g></g><text transform="rotate(4.1 -3681.6 5133.6)"><tspan x="0" y="0" class="o p">A purely peer-to-peer version of electronic cash would  </tspan><tspan x="-.2" y=".6" class="o p">allow online payments to be sent directly from one party  </tspan><tspan x="-.2" y="1.2" class="o p">to another without going through a financial institution.  </tspan><tspan x=".1" y="1.8" class="o p">Digital signatures provide part of the solution, but the  </tspan><tspan x=".5" y="2.3" class="o p">main benefits are lost if a trusted third party is still  </tspan><tspan x=".2" y="2.9" class="o p">required to prevent double-spending. We propose a  </tspan><tspan x=".5" y="3.5" class="o p">solution to the double-spending problem using a  </tspan><tspan x=".7" y="4.1" class="o p">peer-to-peer network. The network timestamps  </tspan><tspan x="-.1" y="4.7" class="o p">transactions by hashing them into an ongoing chain of  </tspan><tspan x="-.2" y="5.3" class="o p">hash-based proof-of-work, forming a record that cannot  </tspan><tspan x=".3" y="5.8" class="o p">be changed without redoing the proof-of-work. The  </tspan><tspan x="-.3" y="6.4" class="o p">longest chain not only serves as proof of the sequence of  </tspan><tspan x="-.3" y="7" class="o p">events witnessed, but proof that it came from the largest  </tspan><tspan x="-.3" y="7.6" class="o p">pool of CPU power. As long as a majority of CPU power is  </tspan><tspan x="0" y="8.2" class="o p">controlled by nodes that are not cooperating to attack  </tspan><tspan x=".3" y="8.8" class="o p">the network, they&amp;apos;ll generate the longest chain and  </tspan><tspan x="0" y="9.3" class="o p">outpace attackers. The network itself requires minimal  </tspan><tspan x="-.1" y="9.9" class="o p">structure. Messages are broadcast on a best effort basis,  </tspan><tspan x=".4" y="10.5" class="o p">and nodes can leave and rejoin the network at will,  </tspan><tspan x=".1" y="11.1" class="o p">accepting the longest proof-of-work chain as proof of  </tspan><tspan x="1.6" y="11.7" class="o p">what happened while they were gone.</tspan></text><g class="q r s"><path fill="#00a99d" d="M296 164.1V266l150.6 11.8z"/><path fill="#5e2f35" d="m300.2 201.7-4.2 64.2 150.7 11.8z"/><path fill="#d90000" d="M296 229.3v38l153.2 11.2z"/><path fill="#0015ff" d="M203.7 331.5c-45.4-1.3-51.3-76.1-51.3-76.1l61.3-20.4 51 37.9s-5.6 60.3-61 58.6z"/><path fill="#fff" d="M205.1 316c-45.4-1.4-41.3-63.1-41.3-63.1l50-18 40 35.4s6.8 47.3-48.7 45.6z"/></g><radialGradient id="B" cx="210" cy="268.3" r="25.6" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#f15a24"/><stop offset="0" stop-color="#dd5221"/><stop offset=".1" stop-color="#af411a"/><stop offset=".2" stop-color="#853214"/><stop offset=".2" stop-color="#61240e"/><stop offset=".3" stop-color="#43190a"/><stop offset=".4" stop-color="#2a1006"/><stop offset=".5" stop-color="#170903"/><stop offset=".6" stop-color="#0a0401"/><stop offset=".7" stop-color="#020100"/><stop offset="1"/></radialGradient><g class="q r s"><path fill="url(#B)" d="M187.3 264c.6-15 11.7-26.7 25-26.3s23.5 12.8 23 27.8-11.7 26.7-25 26.3-23.5-12.9-23-27.8z"/><path fill="#046b09" d="M149.2 256.1s43-37.8 60.6-35.8c24.6 2.8 70 67.7 70 67.7s-50.1-36.3-70.1-40.2c-15-2.9-60.5 8.3-60.5 8.3z"/><path fill="#e7ce3e" d="M234.7 395s53.4-145.4 38.1-245.4c-.9-6 25-6 26 0 15.1 99.4 11.4 279 11.4 279z"/><path fill="#6b0b04" d="M143.4 239.3c5.9-22.4 46.3-46.2 62.5-55 29.3-15.9 81.5 52.7 73.5 61.8-11.6 13.2-49-36.4-69-40.2-15-3-70.9 48.2-67 33.4z"/><g fill="#ff1a00"><path d="M267.3 486.3C263 483.3 221 446 221 446l151.4-19.8s-12.3 39.4-24.2 48.4c-15.2 11.5-64.2 24-81 11.7z"/><path d="M301.3 416.6s17.5-34.6 31-36.6c9.8-1.5 26.6 17.2 34.1 22.3 9.2 6.2 38.7 16.7 38.7 16.7s-32.9 15.4-44.8 18.6c-22.3 6.1-69 12.5-92.3 13-14.3.3-57-3-57-3s24-10.9 31.7-19.7c3.5-4 10.7-18.9 15.4-22 12.5-8.3 24-1.3 29.5 1.9 4.6 2.5 13.7 8.8 13.7 8.8z"/></g><path d="M117 204c14.7-11.8-12.9-110.5 168.7-110.5 174 0 162.4 119.2 162.4 119.2s-51.4-59-161-59S97.6 219.8 117 204z"/></g><path d="M210.4 268.3q.3 0 .2.4l-1.3-.3v-.2l.3-.1.3-.5v-.3l-.3-1q0-.6.7-.7l.6.1.3.4q.1.4-.2.9l-.4.4h-.1l-.2.8m.5-1.8q.1-.5-.3-.6t-.7.4q0 .5.4.6z"/><path d="M211 266.5q-.3.4-.7.4-.5 0-.3-.6a.5.5 0 1 1 1 .2m-.4 0v-.4h-.2v.2l-.1.2h-.1v.1h.1v.1h.1zm-.1-.2"/><path d="m210.4 266.4.1.1h-.1m-2.3 2.7v-.6l.3-.2 3 .7.2.3-.2.5zm0 .5v-.3l3.1.7v.3h-.1l-2.8-.7zm-.6 0 1 .3h.1a1 1 0 0 1 .3.9v.1h-.1l-.2-.2v-.4l-.2-.1-1-.2c-.4 0-.5.5-.2.6h.1l.9.3.2.3h-.1l-1-.2h-.3l-.3-.8.6-.5zm2.9 1.6q-.3-.1-.2-.2v-.3l-.1-.2h-.2l-.9-.3-.2-.2h.4l.8.2h.2l.3.4z"/><path d="m211.5 272-1-.