<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><style>.cube,.face{width:150px;height:150px}body{display:flex;align-items:center;justify-content:center;height:100vh;margin:0;perspective:450px;background:#000}.grid{display:grid;grid-template-columns:repeat(3,1fr);grid-gap:20px}.cube{position:relative;transform-style:preserve-3d;transform:rotateX(45deg) rotateY(45deg);animation:6s linear infinite rotateCube}.face{position:absolute;border:2px solid #333;display:flex;align-items:center;justify-content:center;background-size:cover;font-size:100px;color:#fff; text-shadow: -1px 0 black, 0 1px black, 1px 0 black, 0 -1px black;}.front{transform:translateZ(75px) rotateY(0);background:linear-gradient(45deg,#3498db,#2ecc71)}.back{transform:rotateY(180deg) translateZ(75px);background:linear-gradient(45deg,#2ecc71,#e74c3c)}.left{transform:rotateY(-90deg) translateZ(75px);background:linear-gradient(45deg,#e74c3c,#f39c12)}.right{transform:rotateY(90deg) translateZ(75px);background:linear-gradient(45deg,#f39c12,#9b59b6)}.top{transform:rotateX(90deg) translateZ(75px);background:linear-gradient(45deg,#9b59b6,#3498db)}.bottom{transform:rotateX(-90deg) translateZ(75px);background:linear-gradient(45deg,#ec407a,#ab47bc)}@keyframes rotateCube{from{transform:rotateX(0) rotateY(0)}to{transform:rotateX(360deg) rotateY(360deg)}}</style></head><body><div class=grid></div></body><script>document.addEventListener("DOMContentLoaded",function(){let e=document.querySelector(".grid");for(let t=0;t<9;t++){let d=document.createElement("div");d.classList.add("cube");let a=["front","back","left","right","top","bottom"];a.forEach(e=>{let t=document.createElement("div");t.classList.add("face",e),t.innerHTML="&#8383;",d.appendChild(t)}),e.appendChild(d)}});</script></html>
