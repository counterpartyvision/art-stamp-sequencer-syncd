<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Minesweeper on Bitcoin</title><style>#difficulty select,body{font-family:'Times New Roman',Times,serif}#difficulty select:hover,#header button:hover,.cell,.cell.flagged{background-color:#ddd}#header,.cell{display:flex;font-weight:700}#header,#reset{font-size:20px}#difficulty select,#header button,.cell{cursor:pointer;transition:background-color .3s}body{display:flex;justify-content:center;align-items:center;height:100vh;margin:0;background-color:#f0f0f0}#container{display:flex;align-items:flex-start}#header{flex-direction:column;justify-content:flex-start;margin-left:20px}#difficulty select{font-size:16px;background-color:#ccc;border:2px outset #999;border-radius:5px;padding:5px;margin-top:10px}#minesweeper,#reset{border:2px outset #999;padding:5px;background-color:#ccc}#minesweeper{display:grid;grid-gap:2px;border-radius:10px}.cell{width:20px;height:20px;justify-content:center;align-items:center;font-size:15px;border:1px solid #999;border-radius:5px}.cell.revealed{background-color:#bbb;cursor:default}.cell.mine{background-color:red}.hidden{display:none}.color1{color:#00f}.color2{color:green}.color3{color:red}.color4{color:#00008b}.color5{color:#8b0000}.color6{color:#0ff}.color7{color:#000}.color8{color:gray}#reset{cursor:pointer;margin-bottom:10px;width:60px;border-radius:50%;transition:transform .2s}#reset:hover{transform:scale(1.1)}#header button{background-color:#ccc;border:2px outset #999;border-radius:5px;padding:5px 10px;margin-bottom:10px;font-size:16px}</style></head><body><div id="container"><div id="minesweeper"></div><div id="header"><button id="reset" onclick="resetGame()">🙂</button> <div id="timer">Time: 0</div><div id="difficulty"><label for="level">Difficulty: </label><select id="level"><option value="beginner">Beginner</option><option value="intermediate">Intermediate</option><option value="expert">Expert</option></select></div></div></div><script>const minesweeper=document.getElementById("minesweeper"),timerElement=document.getElementById("timer"),levelSelect=document.getElementById("level"),resetButton=document.getElementById("reset");let rows=9,cols=9,minesCount=10,cells=[],mineArray=[],startTime=Date.now(),timerInterval,gameEnded=!1;function initializeGame(){switch(resetButton.textContent=`🙂`,clearInterval(timerInterval),timerElement.textContent="Time: 0",startTime=Date.now(),gameEnded=!1,levelSelect.value){case"beginner":rows=9,cols=9,minesCount=10;break;case"intermediate":rows=16,cols=16,minesCount=40;break;case"expert":rows=16,cols=30,minesCount=99}minesweeper.style.gridTemplateColumns=`repeat(${cols}, 20px)`,minesweeper.innerHTML="",cells=[],mineArray=Array(rows*cols).fill(!1);for(let e=0;e<minesCount;e++){let t;do t=Math.floor(Math.random()*rows*cols);while(mineArray[t]);mineArray[t]=!0}for(let a=0;a<rows;a++)for(let l=0;l<cols;l++){let n=document.createElement("div");n.classList.add("cell"),n.dataset.row=a,n.dataset.col=l,n.dataset.mine=mineArray[a*cols+l],n.dataset.revealed=!1,n.dataset.flagged=!1,minesweeper.appendChild(n),cells.push(n),n.addEventListener("click",function(){gameEnded||revealCell(n)}),n.addEventListener("contextmenu",function(e){e.preventDefault(),gameEnded||flagCell(n)})}timerInterval=setInterval(updateTimer,1e3)}function updateTimer(){let e=Math.floor((Date.now()-startTime)/1e3);timerElement.textContent=`Time: ${e}`}function revealCell(e){if("true"===e.dataset.revealed||"true"===e.dataset.flagged)return;if(e.dataset.revealed=!0,e.classList.add("revealed"),"true"===e.dataset.mine){e.classList.add("mine"),e.textContent="\uD83D\uDCA3",endGame(!1);return}let t=countMinesAround(e);t>0?(e.textContent=t,e.classList.add(`color${t}`)):revealAdjacentCells(e),checkWin()&&endGame(!0)}function flagCell(e){"true"!==e.dataset.revealed&&(e.dataset.flagged="true"===e.dataset.flagged?"false":"true",e.classList.toggle("flagged"),e.textContent="true"===e.dataset.flagged?"\uD83D\uDEA9":"")}function countMinesAround(e){let t=parseInt(e.dataset.row),a=parseInt(e.dataset.col),l=0;for(let n=-1;n<=1;n++)for(let r=-1;r<=1;r++){let s=t+n,i=a+r;if(s>=0&&s<rows&&i>=0&&i<cols){let d=cells[s*cols+i];"true"===d.dataset.mine&&l++}}return l}function revealAdjacentCells(e){let t=parseInt(e.dataset.row),a=parseInt(e.dataset.col);for(let l=-1;l<=1;l++)for(let n=-1;n<=1;n++){let r=t+l,s=a+n;if(r>=0&&r<rows&&s>=0&&s<cols){let i=cells[r*cols+s];"false"===i.dataset.revealed&&"false"===i.dataset.flagged&&revealCell(i)}}}function endGame(e){gameEnded=!0,clearInterval(timerInterval),cells.forEach(e=>{"true"===e.dataset.mine&&(e.classList.add("mine"),e.textContent="\uD83D\uDCA3")}),e?alert("You Win!"):(alert("Game Over!"),resetButton.textContent=`☹️`)}function checkWin(){return cells.every(e=>"true"===e.dataset.revealed&&"false"===e.dataset.mine||"true"===e.dataset.flagged&&"true"===e.dataset.mine)}function resetGame(){clearInterval(timerInterval),timerElement.textContent="Time: 0",startTime=Date.now(),gameEnded=!1,initializeGame()}levelSelect.addEventListener("change",initializeGame),initializeGame();</script></body></html>
